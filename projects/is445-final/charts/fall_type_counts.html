<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    #vis.vega-embed {
      width: 100%;
      display: flex;
    }

    #vis.vega-embed details,
    #vis.vega-embed details summary {
      position: relative;
    }
  </style>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-lite@5.20.1"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
</head>
<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"continuousWidth": 300, "continuousHeight": 300}, "axis": {"labelFontSize": 12, "titleFontSize": 13}, "title": {"anchor": "start", "fontSize": 18}}, "layer": [{"mark": {"type": "bar", "cornerRadiusTopLeft": 6, "cornerRadiusTopRight": 6}, "encoding": {"color": {"field": "fall", "title": "Record Type", "type": "nominal"}, "tooltip": [{"field": "fall", "title": "Record Type", "type": "nominal"}, {"field": "records", "format": ",", "title": "Records", "type": "quantitative"}, {"field": "percent", "format": ".1f", "title": "Percent", "type": "quantitative"}], "x": {"field": "fall", "title": "Meteorite Record Type", "type": "nominal"}, "y": {"field": "records", "title": "Number of Meteorite Records", "type": "quantitative"}}}, {"mark": {"type": "text", "dy": -12, "fontSize": 13, "fontWeight": "bold"}, "encoding": {"text": {"field": "label", "type": "nominal"}, "x": {"field": "fall", "type": "nominal"}, "y": {"field": "records", "type": "quantitative"}}}], "data": {"name": "data-140f817e59cde85510e064971e131e85"}, "height": 340, "title": "Most Meteorite Records Were Found Later", "width": 520, "$schema": "https://vega.github.io/schema/vega-lite/v5.20.1.json", "datasets": {"data-140f817e59cde85510e064971e131e85": [{"fall": "Found", "records": 37125, "percent": 97.13500784929356, "label": "37,125 records\n(97.1%)"}, {"fall": "Fell", "records": 1095, "percent": 2.8649921507064366, "label": "1,095 records\n(2.9%)"}]}};
      var embedOpt = {"mode": "vega-lite"};

      function showError(el, error){
          el.innerHTML = ('<div style="color:red;">'
                          + '<p>JavaScript Error: ' + error.message + '</p>'
                          + "<p>This usually means there's a typo in your chart specification. "
                          + "See the javascript console for the full traceback.</p>"
                          + '</div>');
          throw error;
      }
      const el = document.getElementById('vis');
      vegaEmbed("#vis", spec, embedOpt)
        .catch(error => showError(el, error));
    })(vegaEmbed);

  </script>
</body>
</html>
